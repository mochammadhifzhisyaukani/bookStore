<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
    <title>BookStore</title>
</head>

<body>
    <!-- NAVBAR -->
    <nav>
        <h1>BookStore</h1>

        <ul>
            <!-- <li><a href="index.html">Beli Buku</a></li> -->
            <li><a href="book.html">Kelola Buku</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="Developer.html">Developer</a></li>
            <li class="logout" onclick="logout()">Log-out</li>
        </ul>
    </nav>

    <center>
        <h2 id="book">Masukan buku yang anda akan jual</h2>
        <hr width="600px">
    </center>
    <main class="index-buku">
        <div class="form-box">
            <table>
                <tr>
                    <td><label>Judul :</label></td>
                    <td><input type="text" id="judul" placeholder="masukan judul buku " required></td>
                </tr>

                <tr>
                    <td><label>Penulis : </label></td>
                    <td><input type="text" id="penulis" placeholder="masukan nama penulis " required></td>
                </tr>

                <tr>
                    <td><label>Genre : </label></td>
                    <td><input type="text" id="genre" placeholder="masukkan genre"></td>
                </tr>.
                <tr>
                    <td><label>Harga : </label></td>
                    <td><input type="number" id="harga" placeholder="Masukan harga buku" required></td>
                </tr>

                <tr>
                    <td><label>Stok : </label></td>
                    <td><input type="number" id="stok" placeholder="Masukan stok buku" required></td>
                </tr>

                <tr>

                    <td><button onclick="tambah()" id="Tambah">Tambah</button></td>
                    <td><button onclick="ClearAll()">Clear All</button></td>
                </tr>
            </table>


        </div>

        <center>
            <h2 id="book">Katalog Buku</h2>
            <hr width="600px">
        </center>

        <!-- <div id="listBuku" class="card-container"></div> -->

        <table class="table table-hover table-bordered" border="4px">
            <thead>
                <tr class="table table-success">
                    <th scope="col">No</th>
                    <th scope="col">Judul</th>
                    <th scope="col">Penulis</th>
                    <th scope="col">Harga</th>
                    <th scope="col">Stok</th>
                    <th scope="col">Edit</th>
                    <th scope="col">Hapus</th>
                </tr>
            </thead>
            <tbody id="listBuku">

            </tbody>
        </table>

        <center>
            <h2 id="book">Katalog Pembelian Buku</h2>
            <hr width="600px">
        </center>

        <div id="listBeli" class="card-container"></div>

        <center>
            <h2>Riwayat Transaksi</h2>
            <hr width="600px">
        </center>

        <div id="strukTransaksi" class="struk-container"></div>


    </main>
    <footer class="footer">
        <p>© BookStore |2026|</p>
        <p>Terima kasih sudah mengunjungi website ini.</p>
    </footer>

    <script src="script.js"></script>


</body>

</html>
