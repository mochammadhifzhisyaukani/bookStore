<body>
    <!-- NAVBAR -->

        <h1>BookStore</h1>

    <center>
        <h2 id="book">Masukan buku yang anda akan jual</h2>
        <hr width="600px">
    </center>
    <main>
        <div class="form-box">
            <table>
                <tr>
                    <td><label>Judul :</label></td>
                    <td><input type="text" id="judul" placeholder="masukan judul buku "></td>
                </tr>

                <tr>
                    <td><label>Penulis : </label></td>
                    <td><input type="text" id="penulis" placeholder="masukan nama penulis "></td>
                </tr>
                     
                <tr>
                    <td><label>Genre : </label></td>
                    <td><input type="text" id="genre" placeholder="masukkan genre"></td>
                </tr>
                <tr>
                    <td><label>Harga : </label></td>
                    <td><input type="number" id="harga" placeholder="Masukan harga buku"></td>
                </tr>

                <tr>
                    <td><label>Stok : </label></td>
                    <td><input type="number" id="stok" placeholder="Masukan stok buku"></td>
                </tr>
                 
                <tr>
                    
                    <td><button onclick="tambah()" id="Tambah">Tambah</button></td>
                    <td><button onclick="ClearAll()">Clear All</button></td>
                </tr>
            </table>


        </div>

        <center>
            <h2 id="book">Katalog Buku</h2>
            <hr width="600px">
        </center>
        <div id="listBuku" class="card-container"></div>

        <center>
        <h2 id="book">Katalog Pembelian Buku</h2>
        <hr width="600px">
        </center>
        <div id="listBeli" class="card-container"></div>

        <center>
        <h2>Riwayat Transaksi</h2>
        <hr width="600px">
    </center>
    <div id="strukTransaksi" class="struk-container"></div>




    </main>
    <footer class="footer">
        <p>© BookStore |2026|</p>
        <p>Terima kasih sudah mengunjungi website ini.</p>
    </footer>
